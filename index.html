<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffd6e7;
  overflow: hidden;
}

/* CENTER (start only) */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* TOP LAYOUT */
.top {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
}

/* Start box */
.start-box {
  background: white;
  padding: 10px 18px;
  border-radius: 14px;
  font-size: 14px;
  opacity: 0;
  transition: 1s;
  display: inline-block;
}

/* Normal text */
.text {
  font-size: 15px;
  opacity: 0;
  transition: 1s;
}

/* Buttons */
.btn {
  margin-top: 10px;
  padding: 6px 14px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  background: #ff99cc;
  font-size: 13px;
}

.blue { background: #66ccff; }

.show { opacity: 1; }

/* Images */
img {
  max-width: 240px;
  margin-top: 10px;
}

/* Hearts */
.heart {
  position: absolute;
  color: #ff4d88;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

/* Balloons */
.balloon {
  position: absolute;
  font-size: 30px;
  animation: fly 6s linear forwards;
}

@keyframes fly {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div id="main"></div>
<audio id="music" src="your-music.mp3"></audio>

<script>

// Hearts
let hearts = setInterval(() => {
  if (document.body.style.background === "black") return;

  let h = document.createElement("div");
  h.className = "heart";
  h.innerText = "♡";
  h.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6000);
}, 400);


// Fade helper
function showStart(content, duration, next) {
  main.innerHTML = `<div class="center"><div class="start-box">${content}</div></div>`;
  let el = document.querySelector(".start-box");

  setTimeout(() => el.classList.add("show"), 100);

  if (duration) {
    setTimeout(() => {
      el.classList.remove("show");
      setTimeout(next, 1000);
    }, duration);
  }
}

function showTop(content, duration, next) {
  main.innerHTML = `<div class="top"><div class="text">${content}</div></div>`;
  let el = document.querySelector(".text");

  setTimeout(() => el.classList.add("show"), 100);

  if (duration) {
    setTimeout(() => {
      el.classList.remove("show");
      setTimeout(next, 1000);
    }, duration);
  }
}


// START FLOW
const main = document.getElementById("main");

showStart("✨ Its Your Special Day Yeyey!", 4000, () => {
  showStart("To Make Something Special For You Because You Are Special To Me!", 4000, () => {
    showStart(`
      Do You Wanna See What I Made?<br>
      <button class="btn" onclick="yes()">Yes!</button>
      <button class="btn">No</button>
    `);
  });
});


// FLOW
function yes() {
  showStart("Have A Look At It, Madam Ji", 2000, lights);
}

function lights() {
  document.body.style.background = "black";

  showTop(`<button class="btn blue" onclick="onLights()">Lights On</button>`);
}

function onLights() {
  document.body.style.background = "#ffd6e7";

  showTop(`<button class="btn" onclick="playMusic()">Play Music</button>`);
}

function playMusic() {
  document.getElementById("music").play();

  showTop(`<button class="btn" onclick="decorate()">Decorate</button>`);
}

function decorate() {
  showTop("Decorating...", 1500, () => {
    showTop(`
      <div>Decorate</div>
      <img src="your-sticker.png"><br>
      <button class="btn" onclick="balloons()">Fly The Balloons</button>
    `);
  });
}

function balloons() {
  showTop("Flying Balloons...", 1500, () => {

    let count = 0;
    let interval = setInterval(() => {
      let b = document.createElement("div");
      b.className = "balloon";
      b.innerText = "🎈";
      b.style.left = Math.random() * 100 + "vw";
      document.body.appendChild(b);

      count++;
      if (count >= 8) clearInterval(interval);
    }, 2000);

    showTop(`
      <div>Fly The Balloons</div>
      <img src="your-sticker.png"><br>
      <button class="btn" onclick="cake()">Lets Cut The Cake Madam Ji</button>
    `);
  });
}

function cake() {
  showTop("Cutting The Cake...", 1500, () => {
    showTop(`
      <div>Lets Cut The Cake Madam Ji</div>
      <img src="your-sticker.png"><br>
      <img src="cake.png"><br>
      <button class="btn" onclick="message()">Well, I Have A Message For You Madam Ji</button>
    `);
  });
}

function message() {
  showTop("Opening Message...", 1500, () => {
    showTop(`
      <div>Well, I Have A Message For You Madam Ji</div>
      <img src="your-sticker.png"><br>
      <img src="cake.png"><br>
      <div>Your Letter Goes Here 💌</div>
    `);
  });
}

</script>

</body>
</html>
