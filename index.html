<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffd6e7;
  overflow: hidden;
  text-align: center;
}

.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Floating hearts */
.heart {
  position: absolute;
  color: #ff4d88;
  animation: float 6s linear infinite;
  font-size: 20px;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* Text styles */
.text {
  font-size: 22px;
  margin: 10px;
  padding: 10px 20px;
  background: white;
  display: inline-block;
  border-radius: 15px;
}

/* Buttons */
.btn {
  margin: 10px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  font-size: 16px;
}

/* Colors */
.pink { background: #ff99cc; }
.blue { background: #66ccff; }

.hidden { display: none; }

.black-bg {
  background: black !important;
  color: white;
}

/* Balloon */
.balloon {
  position: absolute;
  font-size: 40px;
  animation: fly 5s linear infinite;
}

@keyframes fly {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

/* Images */
img {
  max-width: 200px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container" id="main"></div>

<audio id="music" src="your-music.mp3"></audio>

<script>

// Floating hearts
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "♡";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 300);


// Helper functions
function showText(text, duration, next) {
  const main = document.getElementById("main");
  main.innerHTML = `<div class="text">${text}</div>`;
  if (duration) {
    setTimeout(next, duration);
  }
}

function showChoices() {
  const main = document.getElementById("main");
  main.innerHTML = `
    <div class="text">do you wanna see what i made ?</div><br>
    <button class="btn pink" onclick="yesClicked()">Yes!</button>
    <button class="btn pink">No</button>
  `;
}

function yesClicked() {
  showText("have a look at it, Madam Jii", 1500, showLights);
}

function showLights() {
  document.body.classList.add("black-bg");
  document.getElementById("main").innerHTML = `
    <button class="btn blue" onclick="lightsOn()">Lights On</button>
  `;
}

function lightsOn() {
  document.body.classList.remove("black-bg");
  showPlayMusic();
}

function showPlayMusic() {
  document.getElementById("main").innerHTML = `
    <button class="btn pink" onclick="playMusic()">Play Music</button>
  `;
}

function playMusic() {
  document.getElementById("music").play();
  showDecorate();
}

function showDecorate() {
  document.getElementById("main").innerHTML = `
    <button class="btn pink" onclick="decorate()">decorate</button>
  `;
}

function decorate() {
  document.getElementById("main").innerHTML = `
    <button class="btn pink" onclick="balloons()">fly the balloons</button>
    <br>
    <img src="your-sticker.png">
  `;
}

function balloons() {
  for (let i = 0; i < 10; i++) {
    let b = document.createElement("div");
    b.className = "balloon";
    b.innerText = "🎈";
    b.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(b);
  }

  document.getElementById("main").innerHTML += `
    <br>
    <button class="btn pink" onclick="cake()">lets cut the cake madam ji</button>
  `;
}

function cake() {
  document.getElementById("main").innerHTML = `
    <img src="cake.png"><br>
    <button class="btn pink" onclick="message()">Well, I have a message for you madam Ji</button>
  `;
}

function message() {
  document.getElementById("main").innerHTML = `
    <div class="text">[Your letter will appear here 💌]</div>
  `;
}


// Start flow
showText("✨", 1500, () => {
  showText("Its your Special Day Yeyey!", 3000, () => {
    showText("to make something special for you because you are special to me!", 3000, showChoices);
  });
});

</script>

</body>
</html>
