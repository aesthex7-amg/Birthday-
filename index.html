<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffd6e7;
  overflow: hidden;
}

/* Container top after lights */
.top-container {
  position: absolute;
  top: 30px;
  width: 100%;
  text-align: center;
}

/* Center container (start only) */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Floating hearts */
.heart {
  position: absolute;
  color: #ff4d88;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* Text */
.text {
  font-size: 14px;
  padding: 6px 12px;
  background: white;
  border-radius: 12px;
  display: inline-block;
  margin: 6px;
}

/* Buttons */
.btn {
  padding: 6px 14px;
  border-radius: 15px;
  border: none;
  cursor: pointer;
  font-size: 13px;
  margin: 5px;
}

.pink { background: #ff99cc; }
.blue { background: #66ccff; }

.black {
  background: black;
  color: white;
}

/* Balloon */
.balloon {
  position: absolute;
  font-size: 30px;
  animation: fly 6s linear forwards;
}

@keyframes fly {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

img {
  max-width: 220px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="main"></div>

<audio id="music" src="your-music.mp3"></audio>

<script>

// Floating hearts (only for pink bg)
let heartInterval = setInterval(() => {
  if (document.body.classList.contains("black")) return;

  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "♡";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (12 + Math.random() * 10) + "px";

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}, 400);


// Helpers
function showCenter(text, duration, next) {
  document.getElementById("main").innerHTML =
    `<div class="center">
        <div style="font-size:18px;">✨</div>
        <div class="text">${text}</div>
     </div>`;
  setTimeout(next, duration);
}

function showTextTop(content) {
  document.getElementById("main").innerHTML =
    `<div class="top-container">${content}</div>`;
}


// START FLOW
showCenter("Its Your Special Day Yeyey!", 4000, () => {
  showCenter("To Make Something Special For You Because You Are Special To Me!", 4000, showChoice);
});

function showChoice() {
  showCenter(`
    Do You Wanna See What I Made ?
    <br>
    <button class="btn pink" onclick="yes()">Yes!</button>
    <button class="btn pink">No</button>
  `, 0);
}

function yes() {
  showCenter("Have A Look At It, Madam Ji", 2000, lightsPage);
}

function lightsPage() {
  document.body.classList.add("black");
  clearInterval(heartInterval);

  showTextTop(`
    <button class="btn blue" onclick="lightsOn()">Lights On</button>
  `);
}

function lightsOn() {
  document.body.classList.remove("black");
  showPlayMusic();
}

function showPlayMusic() {
  showTextTop(`
    <button class="btn pink" onclick="playMusic()">Play Music</button>
  `);
}

function playMusic() {
  document.getElementById("music").play();
  showDecorate();
}

function showDecorate() {
  showTextTop(`
    <button class="btn pink" onclick="decorate()">Decorate</button>
  `);
}

function decorate() {
  showTextTop(`
    <div class="text">Decorate</div>
    <br>
    <img src="your-sticker.png">
    <br>
    <button class="btn pink" onclick="balloons()">Fly The Balloons</button>
  `);
}

// Balloons one by one
function balloons() {
  showTextTop(`
    <div class="text">Fly The Balloons</div>
    <br>
    <img src="your-sticker.png">
    <br>
    <button class="btn pink" onclick="cake()">Lets Cut The Cake Madam Ji</button>
  `);

  let count = 0;
  let interval = setInterval(() => {
    let b = document.createElement("div");
    b.className = "balloon";
    b.innerText = "🎈";
    b.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(b);

    count++;
    if (count >= 8) clearInterval(interval);
  }, 2000);
}

function cake() {
  showTextTop(`
    <div class="text">Lets Cut The Cake Madam Ji</div>
    <br>
    <img src="your-sticker.png">
    <br>
    <img src="cake.png">
    <br>
    <button class="btn pink" onclick="message()">Well, I Have A Message For You Madam Ji</button>
  `);
}

function message() {
  showTextTop(`
    <div class="text">Well, I Have A Message For You Madam Ji</div>
    <br>
    <img src="your-sticker.png">
    <br>
    <img src="cake.png">
    <br>
    <div class="text">[ Your Letter Will Come Here 💌 ]</div>
  `);
}

</script>

</body>
</html>
